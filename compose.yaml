name: archive-desk

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: archive-desk:0.1.0-alpha.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:${ARCHIVEDESK_WEB_PORT:-4173}:8000"
    environment:
      ARCHIVEDESK_CONTAINER: "1"
      ARCHIVEDESK_HOST: "0.0.0.0"
      ARCHIVEDESK_PORT: "8000"
      ARCHIVEDESK_DATA_DIR: "/data"
      ARCHIVEDESK_STATIC_DIR: "/app/static"
      ARCHIVEDESK_DEFAULT_OUTPUT_ROOT: "/exports"
      ARCHIVEDESK_MASTER_KEY_FILE: "/run/secrets/archivedesk_master_key"
    volumes:
      - archivedesk-data:/data
      - type: bind
        source: ./exports
        target: /exports
    secrets:
      - archivedesk_master_key
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 30s

volumes:
  archivedesk-data:

secrets:
  archivedesk_master_key:
    file: ./.docker/archivedesk_master_key
